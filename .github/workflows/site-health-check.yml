name: Site Health Check

on:
  workflow_dispatch:
  schedule:
    - cron: "15 2 * * *"

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      JEKYLL_GITHUB_TOKEN: ${{ secrets.JEKYLL_GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: python3 -m pip install --upgrade pip pyyaml pillow

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Install Playwright Chromium
        run: npx --yes playwright@1.52.0 install --with-deps chromium

      - name: Validate Kahoot data integrity
        run: python3 scripts/health/check_kahoot_data.py

      - name: Validate Exercise data integrity
        run: python3 scripts/health/check_exercise_data.py

      - name: Validate navigation consistency
        run: python3 scripts/health/check_nav_consistency.py

      - name: Validate style consistency
        run: bash scripts/health/check_style_consistency.sh

      - name: Build site with Jekyll
        run: bundle exec jekyll build

      - name: Validate visual regression snapshots
        run: bash scripts/health/check_visual_regression.sh

      - name: Generate Kahoot funnel health report
        run: python3 scripts/health/report_kahoot_funnel.py

      - name: Run site health checks
        run: bash scripts/health/check_site.sh
