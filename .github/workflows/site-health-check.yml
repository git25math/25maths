name: Site Health Check

on:
  workflow_dispatch:
  schedule:
    - cron: "15 2 * * *"

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run site health checks
        run: bash scripts/health/check_site.sh
