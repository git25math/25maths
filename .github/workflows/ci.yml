name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      JEKYLL_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Python dependencies
        run: python3 -m pip install --upgrade pip pyyaml

      - name: Validate Kahoot data integrity
        run: python3 scripts/health/check_kahoot_data.py

      - name: Validate Exercise data integrity
        run: python3 scripts/health/check_exercise_data.py

      - name: Validate navigation consistency
        run: python3 scripts/health/check_nav_consistency.py

      - name: Build site with Jekyll
        run: bundle exec jekyll build
