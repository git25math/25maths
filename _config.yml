# 25Maths Site Configuration
title: 25Maths
description: "Premium exam-aligned mathematics resources for international exam boards"
url: "https://www.25maths.com"
baseurl: ""
repository: "git25math/25maths"
assets_version: "20260219-bilingual-shutter-v2"

# Waitlist collection (single endpoint for all topics)
waitlist:
  endpoint: "https://script.google.com/macros/s/AKfycbyjJS9KL06UBo2MlxZ-WlleuXHeLzi1tG6MeoRqNTEGHdPg7Zhjc94J6w1iJmk8mFMT9g/exec"
  success_path: "/thanks.html"

# Visitor analytics (simple page/site view counters)
analytics:
  provider: "countapi"
  countapi_namespace: "25maths_website"

# Supabase member system bootstrap (publishable values only)
supabase:
  enabled: true
  url: "https://jjjigohjvmyewasmmmyf.supabase.co"
  anon_key: "sb_publishable_EDe6c9jFS4_PL451oYMYzg_86KRbHRZ"

# Security baseline (applied via meta tags in templates)
security:
  referrer_policy: "strict-origin-when-cross-origin"
  csp: "default-src 'self'; script-src 'self' 'unsafe-inline' https://payhip.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com https://cdn.jsdelivr.net; connect-src 'self' https://api.countapi.xyz https://script.google.com https://script.googleusercontent.com https://*.supabase.co wss://*.supabase.co; frame-src https://payhip.com; frame-ancestors 'self'; form-action 'self' https://script.google.com; base-uri 'self'; object-src 'none'; upgrade-insecure-requests"

# Build settings
plugins:
  - jekyll-redirect-from

# Collections
collections:
  exercises:
    output: true
    permalink: /exercises/:path/

defaults:
  - scope:
      path: ""
      type: exercises
    values:
      active_global: exercises
      lang: en

# Module definitions
modules:
  - key: cie0580
    name: CIE 0580
    full_name: Cambridge IGCSE Mathematics 0580
    path: /cie0580/
    status: active
    color: primary
    description: "Premium exam-aligned resources for Cambridge IGCSE 0580"
    free_count: 8
    product_count: 9
  - key: edx4ma1
    name: Edexcel 4MA1
    full_name: Pearson Edexcel IGCSE Mathematics 4MA1
    path: /edx4ma1/
    status: active
    color: secondary
    description: "Exam-aligned resources for Edexcel IGCSE 4MA1"
    free_count: 6
    product_count: 6

# Exclude from build
exclude:
  - PROJECT-PLAN.md
  - README.md
  - tasks/
  - vendor/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - .bundle/
  - Gemfile
  - Gemfile.lock
  - projects/kahoot-channel/WORKSHEET-GENERATION-ANALYSIS.md
