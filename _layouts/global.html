<!DOCTYPE html>
<html lang="{{ page.lang | default: 'en' }}">
<head>
    {% include head.html %}
</head>
<body class="bg-gray-50">
    {% if site.analytics and site.analytics.gtm_id != "" %}
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id={{ site.analytics.gtm_id }}"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->
    {% endif %}
    <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-0 focus:left-0 focus:z-50 focus:bg-gray-900 focus:text-white focus:px-4 focus:py-2 focus:text-sm focus:font-semibold">Skip to main content</a>
    {% include global-nav.html %}

    <main id="main-content">
    {{ content }}
    </main>

    {% include bilingual-floating-toggle.html %}

    {% include footer.html %}
    {% include mobile-menu-js.html %}
</body>
</html>
