<!DOCTYPE html>
<html lang="{{ page.lang | default: 'en' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% assign canonical_url = site.url | append: page.url | replace: 'index.html', '' %}
    <link rel="canonical" href="{{ canonical_url }}">
    <meta name="referrer" content="{{ site.security.referrer_policy | default: 'strict-origin-when-cross-origin' }}">
    {% if site.security and site.security.csp %}
    <meta http-equiv="Content-Security-Policy" content="{{ site.security.csp }}">
    {% endif %}
    <meta name="robots" content="noindex, nofollow">
    <title>{{ page.title }}</title>
    <link rel="stylesheet" href="/assets/css/site.css?v={{ site.assets_version }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50">
    {{ content }}
</body>
</html>
