<!DOCTYPE html>
<html lang="{{ page.lang | default: 'en' }}">
<head>
    {% include head.html %}
</head>
<body class="bg-gray-50">
    {% if site.analytics and site.analytics.gtm_id != "" %}
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id={{ site.analytics.gtm_id }}"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->
    {% endif %}
    <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-0 focus:left-0 focus:z-50 focus:bg-gray-900 focus:text-white focus:px-4 focus:py-2 focus:text-sm focus:font-semibold">Skip to main content</a>
    {% include global-nav.html %}

    <main id="main-content" class="bg-white">
        <article class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-14 md:py-20">
            <div class="mb-10">
                <p class="text-xs tracking-widest uppercase text-gray-500 mb-3">Legal</p>
                <h1 class="text-3xl md:text-4xl font-semibold text-gray-900">{{ page.title }}</h1>
                <p class="bilingual-support-only mt-3 text-sm text-gray-500">法律与数据处理文件</p>
            </div>

            <div class="blog-post-content prose max-w-none">
                {{ content }}
            </div>
        </article>
    </main>

    {% include bilingual-floating-toggle.html %}

    {% include footer.html %}
    {% include mobile-menu-js.html %}
</body>
</html>
